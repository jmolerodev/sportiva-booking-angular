<div style="min-height: 100vh; background-color: #057b2a;"
  class="d-flex justify-content-center align-items-center position-relative py-5">

  <div class="card shadow" style="width: 100%; max-width: 520px; border-radius: 12px;">
    <div class="card-body p-4 p-md-5" style="user-select: none;">

      <img src="logo-app.png" class="d-block mx-auto mb-3" style="width: 150px; height: 150px;" />

      @if (isInitialLoading) {
        <div class="text-center py-5">
          <div class="spinner-border text-success mb-3" role="status"></div>
          <h5 class="text-success fw-bold">Cargando datos del centro...</h5>
        </div>
      }

      <form [formGroup]="centroForm" (ngSubmit)="saveSportCentre()" [style.display]="isInitialLoading ? 'none' : 'block'">

        <div class="mb-3">
          <label class="form-label text-success fw-bold">Nombre del centro</label>
          <input type="text" class="form-control" placeholder="Ej: Polideportivo Municipal"
            formControlName="nombre"
            [ngClass]="{
              'is-invalid': centroForm.get('nombre')?.invalid && centroForm.get('nombre')?.touched,
              'is-valid':   centroForm.get('nombre')?.valid   && centroForm.get('nombre')?.touched
            }">
        </div>

        <div class="mb-3">
          <label class="form-label text-success fw-bold">Dirección</label>
          <input type="text" class="form-control" placeholder="Calle, Número, Ciudad"
            formControlName="direccion"
            [ngClass]="{
              'is-invalid': centroForm.get('direccion')?.invalid && centroForm.get('direccion')?.touched,
              'is-valid':   centroForm.get('direccion')?.valid   && centroForm.get('direccion')?.touched
            }">
        </div>

        <div class="mb-3">
          <label class="form-label text-success fw-bold">Teléfono</label>
          <input type="tel" class="form-control" placeholder="Introduce el teléfono"
            formControlName="telefono"
            [ngClass]="{
              'is-invalid': centroForm.get('telefono')?.invalid && centroForm.get('telefono')?.touched,
              'is-valid':   centroForm.get('telefono')?.valid   && centroForm.get('telefono')?.touched
            }">
        </div>

        <div class="mb-4">
          <label class="form-label text-success fw-bold">
            Foto <span class="text-muted fw-normal">(opcional)</span>
          </label>

          @if (!previewImagen) {
            <div class="d-flex justify-content-center">
              <label class="btn btn-outline-success fw-bold" style="cursor: pointer;">
                <i class="bi bi-image me-2"></i>Seleccionar imagen
                <input type="file" accept="image/*" class="d-none"
                  (change)="onImagenSeleccionada($event)">
              </label>
            </div>
          }

          @if (previewImagen) {
            <div class="text-center">
              <img [src]="previewImagen" class="img-fluid rounded mb-2 mt-3 shadow-sm"
                style="max-height: 200px; width: 100%; object-fit: cover; border-radius: 8px;"
                (load)="onFotoCargada()"
                (error)="onFotoError()">
              <div>
                <button type="button" class="btn btn-outline-danger btn-sm fw-bold mt-3"
                  (click)="eliminarImagen()">
                  <i class="bi bi-trash me-1"></i>Eliminar imagen
                </button>
              </div>
            </div>
          }
        </div>

        <div class="d-flex justify-content-center gap-2">
          <button type="submit" class="btn btn-success fw-bold w-50 py-2"
            [disabled]="centroForm.invalid || isLoading">
            @if (isLoading) {
              <span class="spinner-border spinner-border-sm me-2"></span>...
            } @else {
              {{ modoEdicion ? 'Guardar Cambios' : 'Crear Centro' }}
            }
          </button>

          @if (modoEdicion) {
            <button type="button" class="btn btn-outline-secondary fw-bold w-50 py-2" 
              (click)="cancelarEdicion()" [disabled]="isLoading">
              Cancelar
            </button>
          }
        </div>

      </form>

    </div>
  </div>

</div>
