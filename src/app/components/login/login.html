<div style="min-height: 100vh; background-color: #0b3d2e;"
    class="d-flex justify-content-center align-items-center position-relative">

    <div class="card shadow" style="width: 100%; max-width: 420px; border-radius: 12px;">
        <div class="card-body p-4 p-md-5">

            <img src="logo-app.png" class="d-block mx-auto mb-3" style="width: 150px; height: 150px;" />

            <form [formGroup]="loginForm" (ngSubmit)="login()">

                <div class="mb-3">
                    <label class="form-label text-success" style="font-weight: bold;">Correo electrónico</label>
                    <input type="email" class="form-control" placeholder="Introduce tu correo electrónico"
                        formControlName="email">
                </div>

                <div class="mb-4">
                    <label class="form-label text-success" style="font-weight: bold;">Contraseña</label>
                    <input type="password" class="form-control" placeholder="Introduce tu contraseña"
                        formControlName="password">
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-success px-4">
                        Iniciar sesión
                    </button>
                </div>

            </form>

        </div>
    </div>

    <i class="bi bi-patch-question text-white position-absolute bottom-0 end-0 m-4 icono-ayuda"
        style="font-size: 4rem; cursor: pointer;" (click)="navigateToAbout()"></i>

</div>
